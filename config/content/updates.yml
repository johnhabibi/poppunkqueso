    This one leans into the adjacent lane without drifting off-brand.

    "Last Ditch Denial," "Shine," and "Fresh Fruit for Rotting Punk Rock Stars" define the ska-forward core.

    MxPx's "Worries" keeps the energy up, while Sorority Noise's "Using" and Michael Cera Palin's "Go Home. Play Music. Feel Better." add indie/emo texture.

