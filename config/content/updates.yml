    - "Front Porch Cinema - Too Loud to Leave"
  bands_added:
    - "Northbound Summer"
    - "The Exit Wounds"
    - "Front Porch Cinema"
  closing_cta: "Follow on Spotify and throw this mix on your next after-show drive home."
  body: |
    The core idea was simple: songs that feel urgent but still melodic enough for repeat listens.

    Northbound Summer brought the nostalgia, but it never slips into throwback cosplay.

    The Exit Wounds dropped a bridge that sounds like you missed your last chance and hit play anyway.

    Front Porch Cinema rounds it out with a bright chorus and enough grit to keep it honest.

